<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="56" ry="56" fill="#0b1220"/>
  <g filter="url(#softGlow)">
    <!-- I -->
    <rect x="64" y="64" width="28" height="128" rx="6" fill="#ffffff"/>
    <!-- T -->
    <rect x="110" y="64" width="82" height="28" rx="6" fill="#ffffff"/>
    <rect x="144" y="64" width="28" height="128" rx="6" fill="#ffffff"/>
  </g>
</svg>